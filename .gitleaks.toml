title = "gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Project-specific allowlist"
paths = [
  '''\.env\.example''',
  '''package-lock\.json''',
  '''frontend/package-lock\.json''',
  '''node_modules/''',
  '''\.wrangler/''',
]

[[allowlist.regexes]]
description = "Placeholder encryption key in .env.example"
regex = '''0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'''

[[allowlist.regexes]]
description = "Obvious placeholder values"
regex = '''(your_[a-z_]+_here|YOUR_[A-Z_]+_HERE|<[A-Z_]+>)'''

name = "domain-renewal-reminder"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Only serve the API on the custom domain; keep workers.dev and preview URLs
# closed so the API isn't reachable through Cloudflare's default public hostnames.
workers_dev = false
preview_urls = false

# Configure your custom domain route in Cloudflare Dashboard or via wrangler CLI
# Example: wrangler deploy --route "your-domain.com/*"
# routes = [
#   { pattern = "your-api-domain.example.com", zone_name = "example.com", custom_domain = true },
# ]

# External modules rules
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Environment variables (set these in Cloudflare dashboard or via wrangler secret)
# ADMIN_PASSWORD - Admin panel password
# ENCRYPTION_KEY - Key for encrypting sensitive data (32 bytes hex)

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "domain_renewal_db"
database_id = "b80fa24a-841f-49da-84a5-cffddb1c5c77"

# KV namespace bindings
[[kv_namespaces]]
binding = "KV"
id = "279e769eecde4179bd64738c088e4b7e"

# Cron trigger for daily reminder checks (runs at 00:00 UTC daily)
[triggers]
crons = ["0 0 * * *"]

# Development configuration
[env.dev]
name = "domain-renewal-reminder-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "domain_renewal_db_dev"
database_id = "placeholder"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "placeholder"
